name: Release PR

on:
  push:
    branches:
      - main

permissions:
  contents: write   # needed for release-please to push version bump commits + tags
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release-please
        id: release-please
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          release-as: true   # bump version + push tag on PR merge
